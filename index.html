<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<h1 class="main-title">Products...</h1>
<input type="text" id="search" placeholder="Search products...">

<select id="category">
  <option value="">All</option>
  <option value="men's clothing">Men</option>
  <option value="women's clothing">Women</option>
  <option value="electronics">Electronics</option>
  <option value="jewelery">Jewelry</option>
</select>

<button onclick="lowHigh()">Low → High</button>
<button onclick="highLow()">High → Low</button>
<h3>Cart (<span id="count">0</span>)</h3>
<div id="cart"></div>
<p>Total: $<span id="total">0</span></p>

<p id="loading">Loading...</p>
    
<div class="products-grid" id="productList"></div>
<div id="errorMsg" class="error-box"></div>

<script src="./script.js"></script>

</body>
</html>
